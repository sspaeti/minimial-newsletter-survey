# Deploy Hugo documentation site to GitHub Pages
name: Deploy Documentation

on:
  push:
    branches: ["main"]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/deploy-docs.yaml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress run and the latest queued. Do NOT cancel in-progress runs —
# production deployments should complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.156.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all history for .GitInfo and .Lastmod
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          cd docs
          hugo --gc --minify
          # Note: we intentionally do NOT pass --baseURL. The hugo.yaml
          # baseURL is https://pollmd.ssp.sh/. Overriding with
          # ${{ steps.pages.outputs.base_url }} returns the github.io
          # project-subpath URL until the custom domain is verified in the
          # repo's Pages settings, which then bakes /pollmd/ into every
          # asset URL and 404s on the live pollmd.ssp.sh host.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
