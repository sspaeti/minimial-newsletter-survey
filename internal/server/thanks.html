<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Thanks!</title>
<style>
  :root {
    --light: #faf8f8;
    --dark: #141021;
    --secondary: #FF5D62;
    --tertiary: #3150AA;
    --primary: #f28482;
    --gray: #4e4e4e;
    --lightgray: #f0f0f0;
    --outlinegray: #dadada;
    --bg: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --light: #1F1F28;
      --dark: #FF5D62;
      --secondary: #658594;
      --tertiary: #E46876;
      --primary: #D27E99;
      --gray: #DCD7BA;
      --lightgray: #181820;
      --outlinegray: #C8C093;
      --bg: #181820;
    }
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--gray);
    line-height: 1.55;
    margin: 0;
    padding: 2rem 1rem;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    max-width: 34rem;
    width: 100%;
    background: var(--light);
    border: 1px solid var(--outlinegray);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
  }

  .hero {
    background: linear-gradient(135deg, rgba(255, 93, 98, 0.10) 0%, rgba(210, 126, 153, 0.10) 100%);
    border-radius: 12px;
    padding: 2rem 1rem 1.5rem;
    margin-bottom: 1.5rem;
  }

  .logo {
    display: inline-block;
    width: 72px;
    height: 72px;
    margin-bottom: 1rem;
  }

  h1 {
    font-weight: 500;
    font-size: 2rem;
    margin: 0 0 0.5rem;
    background: linear-gradient(135deg, var(--secondary), var(--tertiary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin: 0;
    font-size: 1.05rem;
    color: var(--gray);
  }

  .back-link {
    display: inline-block;
    padding: 0.7rem 1.4rem;
    background: linear-gradient(135deg, #FF5D62, #d27e99);
    color: #ffffff;
    text-decoration: none;
    border: 1px solid transparent;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
    line-height: 1.4;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .back-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    align-items: stretch;
    margin: 0;
  }

  .secondary-link {
    display: inline-block;
    padding: 0.7rem 1.4rem;
    background: transparent;
    color: var(--secondary);
    text-decoration: none;
    border: 1px solid var(--secondary);
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
    line-height: 1.4;
    transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
  }

  .secondary-link:hover {
    transform: translateY(-2px);
    background: var(--secondary);
    color: #ffffff;
  }

  .muted {
    color: var(--gray);
    opacity: 0.75;
    font-size: 0.85rem;
    margin: 2rem 0 0;
    padding-top: 1.25rem;
    border-top: 1px solid var(--outlinegray);
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .card { padding: 1.75rem 1.25rem; }
    h1 { font-size: 1.6rem; }
    .logo { width: 60px; height: 60px; }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="hero">
      <img class="logo" src="https://www.ssp.sh/brain/logo_ssp_main.png" alt="sspaeti.com logo">
      <h1>Thanks for your vote!</h1>
      <p class="subtitle">Your feedback helps the next newsletter.</p>
    </div>
    <p class="links">
      <a class="back-link" href="{{.BlogURL}}">Back to the blog &rarr;</a>
      <a class="secondary-link" href="https://www.ssp.sh/brain/newsletter/">Newsletter &rarr;</a>
    </p>
    <p class="muted">
      No cookies, no tracking. Your request was hashed anonymously with a salt
      that rotates every day at midnight UTC, so the hash can&rsquo;t be tied
      back to you.
    </p>
  </main>
</body>
</html>
